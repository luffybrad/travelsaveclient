<div class="min-h-screen bg-gray-50">
    <!-- Sidebar -->
    <aside [class.w-64]="isSidebarOpen" [class.w-20]="!isSidebarOpen"
        class="fixed top-0 left-0 h-full bg-white border-r border-gray-200 transition-all duration-300 z-40 overflow-hidden">

        <!-- Logo -->
        <div class="h-16 flex items-center px-4 border-b border-gray-200">
            @if (isSidebarOpen) {
            <span class="text-xl font-bold text-blue-600">TravelSave</span>
            <span class="ml-1 text-sm text-gray-500">Admin</span>
            } @else {
            <span class="text-xl font-bold text-blue-600 mx-auto">TS</span>
            }
        </div>

        <!-- Navigation -->
        <nav class="mt-4 px-2">
            @for (item of menuItems; track item.path) {
            <a [routerLink]="item.path" routerLinkActive="bg-blue-50 text-blue-600"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 hover:bg-gray-50 transition group">
                <span class="text-xl">{{ item.icon }}</span>
                @if (isSidebarOpen) {
                <span class="font-medium">{{ item.label }}</span>
                }
            </a>
            }
        </nav>

        <!-- User Section -->
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-medium">
                    {{ (userName || 'A').charAt(0).toUpperCase() }}
                </div>
                @if (isSidebarOpen) {
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">{{ userName || 'Admin' }}</p>
                    <p class="text-xs text-gray-500">Administrator</p>
                </div>
                <button (click)="logout()"
                    class="p-1.5 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
                }
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div [class.ml-64]="isSidebarOpen" [class.ml-20]="!isSidebarOpen" class="transition-all duration-300 min-h-screen">

        <!-- Top Bar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-6 sticky top-0 z-30">
            <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100 transition">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="flex-1"></div>

            <!-- Mobile Logout -->
            <button (click)="logout()"
                class="md:hidden p-2 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <!-- Page Content -->
        <main>
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
